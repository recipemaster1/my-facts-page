<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facts - Unlimited Creator</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #050505; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; padding: 20px; }
        
        /* The Video Box */
        .shorts-preview {
            width: 320px; height: 568px; 
            background: black; position: relative;
            overflow: hidden; display: flex; align-items: center; 
            justify-content: center; text-align: center;
            border: 6px solid #222; border-radius: 30px;
            box-shadow: 0 0 30px rgba(255,0,0,0.1);
        }

        #bgVideo { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; filter: brightness(0.4) blur(1px); }

        #factDisplay {
            position: relative; z-index: 2; padding: 25px;
            font-size: 20px; font-weight: 800; line-height: 1.4;
            text-shadow: 0 2px 10px rgba(0,0,0,1);
            text-transform: uppercase;
        }

        .controls { width: 350px; background: #111; padding: 25px; border-radius: 15px; border: 1px solid #222; }
        h1 { color: #ff0000; font-size: 20px; margin: 0 0 10px 0; }
        .status { font-size: 12px; color: #00ff00; margin-bottom: 20px; font-family: monospace; }
        
        button {
            width: 100%; padding: 16px; margin-bottom: 12px;
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer;
            font-size: 16px; transition: 0.2s;
        }
        .gen-btn { background: #ff0000; color: white; }
        .gen-btn:disabled { background: #555; cursor: not-allowed; }
        .copy-btn { background: #333; color: white; }
        
        textarea { 
            width: 100%; height: 140px; background: #000; color: #bbb; 
            border: 1px solid #333; padding: 10px; border-radius: 5px; 
            font-size: 13px; resize: none; margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="shorts-preview">
        <video id="bgVideo" autoplay muted loop playsinline src="https://assets.mixkit.co/videos/preview/mixkit-stars-in-the-deep-space-1572-large.mp4"></video>
        <div id="factDisplay">FETCHING THE TRUTH...</div>
    </div>

    <div class="controls">
        <h1>FACTS UNLIMITED</h1>
        <div class="status" id="statusText">● API CONNECTED</div>
        
        <button id="btn" class="gen-btn" onclick="getLiveFact()">GET FRESH FACT 🌍</button>
        
        <label style="font-size: 11px; font-weight: bold; color: #888;">AUTO-DESCRIPTION:</label>
        <textarea id="descriptionBox" readonly></textarea>
        
        <button class="copy-btn" onclick="copyDesc()">COPY FOR YOUTUBE</button>
    </div>
</div>

<script>
    // These are backup videos to keep it interesting
    const videos = [
        "https://assets.mixkit.co/videos/preview/mixkit-stars-in-the-deep-space-1572-large.mp4",
        "https://assets.mixkit.co/videos/preview/mixkit-sun-setting-or-rising-over-a-planet-4043-large.mp4",
        "https://assets.mixkit.co/videos/preview/mixkit-underwater-bubbles-rising-to-the-surface-4041-large.mp4",
        "https://assets.mixkit.co/videos/preview/mixkit-mysterious-particle-dust-4428-large.mp4"
    ];

    async function getLiveFact() {
        const btn = document.getElementById('btn');
        const display = document.getElementById('factDisplay');
        const status = document.getElementById('statusText');
        
        // 1. Loading State
        btn.disabled = true;
        btn.innerText = "SEARCHING...";
        status.innerText = "○ FETCHING FROM DATABASE...";

        try {
            // 2. The API Call (Getting a random fact from the internet)
            const response = await fetch('https://uselessfacts.jsph.pl/api/v2/facts/random');
            const data = await response.json();
            const factText = data.text;

            // 3. Update the Visuals
            display.innerText = factText;
            
            // 4. Change Video Background
            const video = document.getElementById('bgVideo');
            video.src = videos[Math.floor(Math.random() * videos.length)];
            video.play();

            // 5. Update Description
            document.getElementById('descriptionBox').value = `🤯 UNLIMITED FACTS!\n\n${factText}\n\nDid you know this? Subscribe to @Facts for your daily dose of amazing knowledge! 🌍✨\n\n#Facts #DidYouKnow #Knowledge #Shorts #Viral #Education`;
            
            status.innerText = "● FACT RECEIVED";
        } catch (error) {
            display.innerText = "Connection Error! Try again.";
            status.innerText = "× API ERROR";
        } finally {
            btn.disabled = false;
            btn.innerText = "GET FRESH FACT 🌍";
        }
    }

    function copyDesc() {
        const box = document.getElementById('descriptionBox');
        if(!box.value) return;
        box.select();
        document.execCommand('copy');
        alert("Description Copied!");
    }

    // Load first fact on start
    window.onload = getLiveFact;
</script>

</body>
</html>
